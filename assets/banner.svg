<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640" role="img" aria-label="claude-fleet — run many parallel Claude Code agents on one repo, without conflicts">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0d1117"/>
      <stop offset="1" stop-color="#161b22"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#d97757"/>
      <stop offset="1" stop-color="#e0a07a"/>
    </linearGradient>
  </defs>
  <rect width="1280" height="640" fill="url(#bg)"/>

  <!-- trunk (main) + diverging worktree branches, each ending in an agent node -->
  <g stroke="#30363d" stroke-width="3" fill="none">
    <path d="M860 320 H1190"/>
    <path d="M980 320 C1050 320 1050 150 1120 150"/>
    <path d="M980 320 C1050 320 1050 245 1120 245"/>
    <path d="M980 320 C1050 320 1050 395 1120 395"/>
    <path d="M980 320 C1050 320 1050 490 1120 490"/>
  </g>
  <g fill="#d97757">
    <circle cx="860" cy="320" r="11"/>
    <circle cx="1120" cy="150" r="9"/><circle cx="1120" cy="245" r="9"/>
    <circle cx="1120" cy="395" r="9"/><circle cx="1120" cy="490" r="9"/>
    <circle cx="1190" cy="320" r="9"/>
  </g>

  <text x="80" y="250" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Helvetica,Arial,sans-serif" font-size="104" font-weight="800" fill="#e6edf3">claude-fleet</text>
  <rect x="84" y="286" width="132" height="8" rx="4" fill="url(#accent)"/>
  <text x="84" y="362" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Helvetica,Arial,sans-serif" font-size="37" fill="#adbac7">Run many parallel Claude Code agents on one repo —</text>
  <text x="84" y="410" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Helvetica,Arial,sans-serif" font-size="37" fill="#adbac7">without conflicts.</text>
  <text x="84" y="472" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Helvetica,Arial,sans-serif" font-size="24" fill="#768390">git-worktree locks · crash recovery · merge gate · guard hooks</text>
  <text x="80" y="586" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="22" fill="#636e7b">github.com/jellologic/claude-fleet   ·   MIT   ·   shell + python3</text>
</svg>
